<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="你的圖片網址.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>乙級網頁設計 - 行動題庫</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif; 
            background-color: #f4f7f9; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: 100%; margin: auto; background: white; min-height: 100vh; padding-bottom: 50px; }
        h2 { font-size: 1.25rem; color: #1a73e8; text-align: center; padding: 15px 0; margin: 0; background: #fff; border-bottom: 1px solid #eee; }
        
        /* 導覽列 */
        .filter-bar { 
            position: sticky; top: 0; background: white; padding: 10px 5px; 
            border-bottom: 1px solid #ddd; display: flex; gap: 5px; flex-wrap: wrap; 
            z-index: 100; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        button { 
            padding: 8px 10px; border: none; border-radius: 20px; cursor: pointer; 
            font-weight: bold; font-size: 0.85rem; color: white; background-color: #5f6368;
            flex-grow: 1; max-width: 90px;
        }

        .btn-all { background-color: #1a73e8; }
        .btn-sec { background-color: #ff922b; } /* 資訊共用橘色 */

        /* 測驗面板 */
        .exam-setup { background: #fff9db; padding: 15px; margin: 10px; border-radius: 8px; border: 2px dashed #fcc419; display: none; }
        .setup-row { display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .setup-row div { font-size: 0.9rem; font-weight: bold; }
        input[type="number"] { width: 60px; padding: 5px; border: 1px solid #ccc; border-radius: 5px; text-align: center; }

        /* 題目樣式 */
        .q-item { padding: 15px; border-bottom: 8px solid #f4f7f9; border-left: 5px solid transparent; }
        .count-1 { border-left-color: #4dabf7; }
        .count-2 { border-left-color: #eee960; } 
        .count-3 { border-left-color: #ab0000; }     
        .count-4 { border-left-color: #00a627; } 
        
        .q-img { max-width: 100%; height: auto; display: block; margin: 10px 0; border-radius: 5px; border: 1px solid #eee; }
        .ans-tag { display: inline-block; padding: 2px 8px; background: #333; color: #fff; border-radius: 4px; font-size: 0.8rem; margin-bottom: 8px; }
        .q-no { color: #888; font-size: 0.75rem; margin-bottom: 5px; }
        .q-content { font-size: 1rem; font-weight: 500; line-height: 1.4; color: #202124; }

        /* 選項區塊 */
        .quiz-options { margin-top: 15px; display: flex; flex-direction: column; gap: 8px; }
        .quiz-options label { padding: 12px; border: 1px solid #dadce0; border-radius: 10px; display: flex; align-items: center; background: #fff; }
        .quiz-options input { margin-right: 12px; width: 18px; height: 18px; }

        .feedback { margin-top: 10px; padding: 10px; border-radius: 5px; font-weight: bold; text-align: center; }
        .correct { background: #e6f4ea; color: #1e8e3e; }
        .wrong { background: #fce8e6; color: #d93025; }

        .rank-row { border-bottom: 1px solid #eee; }
        .rank-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .rank-content { display: none; padding: 15px; background: #f9f9f9; border-left: 5px solid #6f42c1; }
        #stats { text-align: center; font-size: 0.75rem; color: #666; padding: 5px; background: #fafafa; }
    </style>
</head>
<body>

<div class="container">
    <h2>17300 網頁設計乙級學科</h2>
    <div id="stats">載入中...</div>

    <div class="filter-bar">
        <button onclick="render(0)" class="btn-all">全部</button>
        <button onclick="render(1)" style="background-color: #4dabf7;">一般單選</button>
        <button onclick="render('security')" class="btn-sec">資訊共用</button>
        <button onclick="render(2)" style="background-color: #eee960; color:#333">對2</button>
        <button onclick="render(3)" style="background-color: #ab0000;">對3</button>
        <button onclick="render(4)" style="background-color: #00a627;">全對</button>
        <button onclick="toggleSetup()" style="background-color: #dc3545;">測驗</button>
        <button onclick="showRank()" style="background-color: #6f42c1;">排行</button>
    </div>

    <div id="exam-setup-panel" class="exam-setup">
        <div class="setup-row">
            <strong>📋 抽題題數設定</strong>

            <div>一般複選：<input type="number" id="multi-count" value="5"></div>
            <button onclick="startCustomExam()" style="background-color: #1e8e3e; max-width: 100%; width: 100%; height: 40px; margin-top:10px;">開始隨機測驗</button>
        </div>
    </div>

    <div id="quiz-result" style="display:none; padding: 20px; text-align: center; border-bottom: 2px solid #ddd;"></div>
    <div id="main-list"></div>
</div>

  { "ans": "2", "count": 1, "category": "security","content": "1. 在量販店內，商品包裝上所貼的「條碼(Barcode)」係協助結帳及庫存盤點之用，則該條碼在此方面之資料處理作業上係屬於下列何者？ ①輸入設備 ②輸入媒體 ③輸出設備 ④輸出媒體 。" },
  { "ans": "2", "count": 1, "category": "security","content": "2. 有關「CPU 及記憶體處理」之說明， 下列何者「不正確」？ ①控制單元負責指揮協調各單元運作 ②I/O 負責算術運算及邏輯運算 ③ALU 負責算術 運算及邏輯運算 ④記憶單元儲存程式指令及資料 。" },
  { "ans": "2", "count": 1, "category": "security","content": "3. 有關二進位數的表示法，下列何者「不正確」？ ①101 ② 1A ③1 ④11001 。" },
  { "ans": "2", "count": 1, "category": "security","content": "4. 負責電腦開機時執行系統自動偵測及支援相關應用程式， 具輸入輸出功能的元件為下列何者？ ①DOS ②BIOS ③I/O ④RAM 。" },
  { "ans": "4", "count": 1, "category": "security","content": "5. 在處理器中位址匯流排有 32 條， 可以定出多少記憶體位址？ ①512 MB ②1GB ③2 GB ④ 4GB 。" },

  { "ans": "2", "count": 1, "category": "security","content": "7. 下列技術何者為一個處理器中含有兩個執行單元， 可以同時執行兩個並行執行緒， 以提升處理器的運算效能與多工作業的能力？ ①超執行緒(Hyper Thread) ②雙核心(Dual Core) ③超純量(Super Scalar) ④單指令多資料(Single Instruction Multiple Data) 。" },
  { "ans": "1", "count": 1, "category": "security","content": "8. 下列技術何者為將一個處理器模擬成多個邏輯處理器，以提升程式執行之效能？ ①超執行緒(Hyper Thread) ②雙核心(Dual Core) ③超純量( Super Scalar) ④單指令多資料( Single Instruction Multiple Data) 。" },
  { "ans": "2", "count": 1, "category": "security","content": "9. 有關記憶體的敘述， 下列何者「不正確」？ ①CPU 中的暫存器執行速度比主記憶體快 ②快取磁碟(Disk Cache) 是利用記憶體中的快取記憶體(Cache Memory) 來存放資料 ③在系統軟體中，透過軟體與輔助儲存體來擴展主記憶體容量，使數個大型程式得以同時放在主記憶體內執行的技術是虛擬記憶體(Virtual Memory) ④個人電腦上大都有 Level 1( L1 ) 及 Level 2 ( L2 ) 快取記憶體(Cache Memory)， 其中 L1 快取的速度較快，但容量較小 。" },
  { "ans": "4", "count": 1, "category": "security","content": "10. 有關電腦衡量單位之敘述，下列何者「不正確」？ ①衡量印表機解析度的單位是 DPI ( Dots Per Inch) ②磁帶資料儲存密度的單位是 BPI (Bytes PerInch) ③衡量雷射印表機列印速度的單位是 PPM ( Pages Per Minute) ④通訊線路傳輸速率的單位是 BPS (Bytes Per Second) 。" },
  { "ans": "1", "count": 1, "category": "security","content": "11. 有關電腦儲存資料所需記憶體的大小排序，下列何者正確？ ① 1TB＞ 1GB＞1MB＞1KB ②1KB＞1GB＞1 MB＞1 TB ③1GB＞1 MB＞1 TB＞1KB ④ 1TB＞ 1KB＞ 1MB＞1 GB 。" },
  { "ans": "2", "count": 1, "category": "security","content": "12. 以微控制器為核心， 並配合適當的周邊設備，以執行特定功能，主要是用來控制、監督或輔助特定設備的裝置，其架構仍屬於一種電腦系統( 包含處理器、記憶體、輸入與輸出等硬體元素)， 目前最常見的應用有 PDA、手機及資訊家電， 這種系統稱為下列何者？ ①伺服器系統 ②嵌入式系統 ③分散式系統 ④個人電腦系統 。" },
  { "ans": "4", "count": 1, "category": "security","content": "13. 有 A、B 兩個大小相同的檔案， A 檔案儲存在硬碟連續的位置，而 B 檔案儲存在硬碟分散的位置，因此 A 檔案的存取時間比 B 檔案少， 下列何者為主要影響因素？ ①CPU 執行時間( Execution Time) ②記憶體存取時間( Memory Access Time) ③傳送時間( Transfer Time) ④搜尋時間( Seek Time) 。" },
  { "ans": "3", "count": 1, "category": "security","content": "14. 有關資料表示， 下列何者「不正確」？ ① 1Byte=8bits ② 1KB=210 Bytes ③ 1MB=215 Bytes ④1GB=230 Bytes 。" },
  { "ans": "4", "count": 1, "category": "security","content": "15. 有關資料儲存媒體之敘述，下列何者正確？ ①儲存資料之光碟片，可以直接用餐巾紙沾水以同心圓擦拭，以保持資料儲存良好狀況 ②MO ( Magnetic Optical) 光碟機所使用的光碟片，外型大小及儲存容量均與 CD-ROM 相同 ③RAM 是一個經設計燒錄於硬體設備之記憶體 ④可消除及可規劃之唯讀記憶體的縮寫為 EPROM 。" },
  { "ans": "1", "count": 1, "category": "security","content": "16. 下列何者為 RAID(Redundant Array of Independent Disks) 技術的主要用途？ ①儲存資料 ②傳輸資料 ③播放音樂 ④播放影片 。" },
  { "ans": "1", "count": 1, "category": "security","content": "17. 硬碟的轉速會影響磁碟機在讀取檔案時所需花的下列何種時間？ ①旋轉延遲(Rotational Latency) ②尋找時間( Seek Time) ③資料傳輸( Transfer Time) ④磁頭切換( Head Switching) 。" },
  { "ans": "3", "count": 1, "category": "security","content": "18. 微處理器與外部連接之各種訊號匯流排， 何者具有雙向流通性？ ①控制匯流排 ②狀態匯流排 ③資料匯流排 ④位址匯流排 。" },

const examData = rawData;
let errorStats = JSON.parse(localStorage.getItem('webDesign_Errors')) || {};

function toggleSetup() {
    const p = document.getElementById('exam-setup-panel');
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
}

function getImgHtml(imgSrc) {
    if (!imgSrc || imgSrc.trim() === "") return "";
    
    // 自動判斷：如果是 meee.com.tw 的網址且沒有副檔名，就自動補上 .png
    let realSrc = imgSrc;
    if (imgSrc.includes("meee.com.tw") && !imgSrc.endsWith(".jpg")) {
        realSrc = imgSrc + ".jpg";
    }
    
    return `<img src="${realSrc}" class="q-img" alt="題目圖片" onerror="this.style.display='none'">`;
}

function render(filterMode) {
    document.getElementById('exam-setup-panel').style.display = 'none';
    const list = document.getElementById('main-list');
    const stats = document.getElementById('stats');
    document.getElementById('quiz-result').style.display = 'none';
    list.innerHTML = '';
    
    let filtered = [];
    if (filterMode === 0) filtered = examData;
    else if (filterMode === 'security') filtered = examData.filter(q => q.category === 'security');
    else if (filterMode === 1) filtered = examData.filter(q => q.count === 1 && q.category !== 'security');
    else filtered = examData.filter(q => q.count === filterMode);

    stats.innerHTML = `顯示 ${filtered.length} 題 / 總計 ${examData.length} 題`;

    filtered.forEach(q => {
        const div = document.createElement('div');
        div.className = `q-item ${q.category === 'security' ? '' : 'count-' + q.count}`;
        if (q.category === 'security') div.style.borderLeft = "5px solid #ff922b";
        
        div.innerHTML = `
            <div class="q-no">#${q.id} ${q.category === 'security' ? '<span style="color:#ff922b">[資訊共用]</span>' : ''}</div>
            <div class="ans-tag">答案：${q.ans}</div>
            <div class="q-content">${q.content}</div>
            ${getImgHtml(q.img)}
        `;
        list.appendChild(div);
    });
    window.scrollTo(0, 0);
}

function startCustomExam() {
    const s = parseInt(document.getElementById('single-count').value) || 0;
    const sec = parseInt(document.getElementById('security-count').value) || 0;
    const m = parseInt(document.getElementById('multi-count').value) || 0;

    const singlePool = examData.filter(q => q.count === 1 && q.category !== 'security').sort(() => 0.5 - Math.random());
    const secPool = examData.filter(q => q.category === 'security').sort(() => 0.5 - Math.random());
    const multiPool = examData.filter(q => q.count > 1).sort(() => 0.5 - Math.random());

    const selected = [...singlePool.slice(0, s), ...secPool.slice(0, sec), ...multiPool.slice(0, m)].sort(() => 0.5 - Math.random());
    
    if (selected.length === 0) return alert("請設定題數");
    document.getElementById('exam-setup-panel').style.display = 'none';
    renderQuiz(selected);
}

function renderQuiz(selected) {
    const list = document.getElementById('main-list');
    list.innerHTML = '';
    selected.forEach((q, index) => {
        const div = document.createElement('div');
        div.className = 'q-item';
        const type = q.count === 1 ? 'radio' : 'checkbox';
        let options = '';
        for(let i=1; i<=4; i++) { options += `<label><input type="${type}" name="q-${q.id}" value="${i}"> (${i}) 選項 </label>`; }
        div.innerHTML = `
            <div class="q-no">測驗第 ${index + 1} 題 (#${q.id})</div>
            <div class="q-content">${q.content}</div>
            ${getImgHtml(q.img)}
            <div class="quiz-options" data-ans="${q.ans}" id="box-${q.id}">${options}</div>
            <div id="fb-${q.id}"></div>
        `;
        list.appendChild(div);
    });
    const b = document.createElement('button');
    b.innerHTML = "提交答案";
    b.style.cssText = "width:90%; height:50px; margin:20px 5%; background:#1e8e3e; color:white; font-size:1.1rem; border:none; border-radius:10px;";
    b.onclick = submitExam;
    list.appendChild(b);
    window.scrollTo(0, 0);
}

function submitExam() {
    const boxes = document.querySelectorAll('.quiz-options');
    let correct = 0;
    boxes.forEach(box => {
        const id = box.id.replace('box-', '');
        const real = box.getAttribute('data-ans').split('').sort().join('');
        const user = Array.from(box.querySelectorAll('input:checked')).map(i => i.value).sort().join('');
        const fb = document.getElementById(`fb-${id}`);
        if (user === real) { correct++; fb.innerHTML = `<div class="feedback correct">✅ 正確</div>`; }
        else { 
            fb.innerHTML = `<div class="feedback wrong">❌ 錯誤 (答案：${box.getAttribute('data-ans')})</div>`; 
            errorStats[id] = (errorStats[id] || 0) + 1; 
        }
        box.querySelectorAll('input').forEach(i => i.disabled = true);
    });
    localStorage.setItem('webDesign_Errors', JSON.stringify(errorStats));
    const score = Math.round((correct / boxes.length) * 100);
    const res = document.getElementById('quiz-result');
    res.style.display = 'block';
    res.innerHTML = `<h3>得分：${score}</h3><button onclick="showRank()" class="btn-rank" style="background:#6f42c1; color:white; padding:10px; border-radius:10px; border:none;">查看錯題排行</button>`;
    window.scrollTo(0, 0);
}

function showRank() {
    // 1. 先把不相干的區塊隱藏或清空
    document.getElementById('exam-setup-panel').style.display = 'none'; // 隱藏測驗設定
    document.getElementById('quiz-result').style.display = 'none';    // 隱藏得分結果
    
    const list = document.getElementById('main-list');
    
    // 2. 準備清空內容
    const sorted = Object.entries(errorStats)
        .map(([id, count]) => ({ id: parseInt(id), count }))
        .sort((a, b) => b.count - a.count);

    if (sorted.length === 0) {
        list.innerHTML = '<p style="text-align:center; padding: 20px;">目前尚無錯題紀錄</p>';
        return;
    }

    // 3. 徹底清空列表後再開始畫排行
    list.innerHTML = `<div style="text-align:center; padding:10px;"><button onclick="clearStats()" style="background:#ff4d4f; color:white; border:none; padding:10px; border-radius:5px; width:90%">🗑️ 清空所有紀錄</button></div>`;
    
    sorted.slice(0, 30).forEach((item, index) => {
        const q = examData.find(x => x.id === item.id);
        if(q) {
            const div = document.createElement('div');
            div.className = 'rank-row';
            div.innerHTML = `
                <div class="rank-header" onclick="this.nextElementSibling.style.display = (this.nextElementSibling.style.display === 'block' ? 'none' : 'block')">
                    <div style="font-size:0.9rem;"><strong>${index+1}.</strong> #${q.id} ${q.content.substring(0, 15)}...</div>
                    <div style="color:red">錯 ${item.count} 次 ▾</div>
                </div>
                <div class="rank-content" style="display:none;">
                    <div class="ans-tag">答案：${q.ans}</div>
                    <div style="font-weight:bold;">${q.content}</div>
                    ${getImgHtml(q.img)}
                </div>
            `;
            list.appendChild(div);
        }
    });
    window.scrollTo(0, 0); // 回到最上方
}

function clearStats() {
    if(confirm("確定要清空紀錄嗎？")) { localStorage.removeItem('webDesign_Errors'); errorStats = {}; showRank(); }
}

render(0);
</script>
</body>
</html>
